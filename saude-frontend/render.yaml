services:
  - type: web
    name: saude-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://saude-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
