name: CI/CD Frontend

on:
  push:
    branches: [main]
    paths:
      - 'saude-frontend/**' # Garante que só roda se mexer no frontend
  pull_request:
    branches: [main]
    paths:
      - 'saude-frontend/**' # Garante que só roda se mexer no frontend

jobs:
  test-build:
    name: Test & Build
    runs-on: ubuntu-latest
    
    # Define que todos os comandos 'run' deste job serão executados na pasta do frontend
    defaults:
      run:
        working-directory: ./saude-frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Como o package-lock.json não está na raiz, precisamos dizer onde ele está para o cache funcionar
          cache-dependency-path: 'saude-frontend/package-lock.json' 

      - name: Instalar dependências
        run: npm install

      - name: Executar testes
        run: npm test

      - name: Build de produção
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          # O actions/upload-artifact parte da raiz do repo, então precisa do caminho completo
          path: saude-frontend/dist/

  deploy:
    name: Deploy Render
    runs-on: ubuntu-latest
    needs: test-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger deploy no Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND_URL }}"