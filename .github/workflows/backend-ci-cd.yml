name: CI/CD Backend

on:
  push:
    branches: [main]
    paths:
      - 'saude-backend/**' # Garante que só roda se mexer no backend
  pull_request:
    branches: [main]
    paths:
      - 'saude-backend/**' # Garante que só roda se mexer no backend

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    # Define que todos os comandos 'run' deste job serão executados na pasta do backend
    defaults:
      run:
        working-directory: ./saude-backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes
        run: mvn clean test

      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          # O actions/upload-artifact parte da raiz do repo, então precisa do caminho completo
          path: saude-backend/target/surefire-reports/

  deploy:
    name: Deploy Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deploy no Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"