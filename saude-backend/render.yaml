services:
  - type: web
    name: saude-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saude-db
          property: connectionString
      - key: PORT
        value: 8080

databases:
  - name: saude-db
    databaseName: saude
    user: saude_user
    plan: free
