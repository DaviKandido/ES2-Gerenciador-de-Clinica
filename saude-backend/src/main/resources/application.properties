spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/saude}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:saude_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:saude123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=${PORT:8080}
spring.jackson.serialization.write-dates-as-timestamps=false